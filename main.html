<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>MADUSANKA MD Pairing</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  background-size:cover;
  background-position:center;
  transition:1s;
}

/* DARK RED OVERLAY */
body::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(0,0,0,0.85), rgba(30,0,0,0.8));
}

/* CARD */
.container{
  position:relative;
  z-index:2;
}

.card{
  width:360px;
  padding:28px 22px;
  border-radius:20px;

  /* GLASS LOOK */
  background:rgba(255,0,0,0.08);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,0,0,0.25);

  box-shadow:0 0 40px rgba(255,0,0,0.35);

  text-align:center;
}

/* TITLE */
.card h2{
  color:#ff1a1a;
  text-shadow:0 0 15px #ff0000;
}

/* TEXT */
.card p{
  color:#aaa;
  font-size:13px;
}

/* INPUT */
.input-box{
  margin-top:18px;
  display:flex;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 0 15px rgba(255,0,0,0.3);
}

.input-box input{
  flex:1;
  padding:12px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.08);
  color:#fff;
}

.input-box button{
  padding:12px 16px;
  border:none;
  background:linear-gradient(135deg,#ff0000,#8b0000);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

/* OUTPUT GLASS */
#pair{
  margin-top:18px;
  color:#fff;
  font-weight:bold;
}

#copy{
  backdrop-filter:blur(15px);
  background:rgba(255,0,0,0.15);
  padding:8px 12px;
  border-radius:10px;
  border:1px solid rgba(255,0,0,0.3);
}

/* FLOAT DOTS */
.dot{
  position:absolute;
  width:5px;
  height:5px;
  background:#ff0000;
  border-radius:50%;
  animation:floatUp linear infinite;
}

@keyframes floatUp{
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-10vh);}
}

/* SOUND BUTTON */
.sound-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:52px;
  height:52px;
  border-radius:50%;
  background:rgba(255,0,0,0.8);
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 0 20px red;
}

.sound-btn i{
  color:#fff;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h2>Queen Ishaa MD</h2>
    <p>^</p>
    <p>^</p>
    <p>^</p>
    <p>^</p>
    <p>^</p>
    <p>^</p>
    <p>^</p>
    <h6>PAIR YOUR BOT AND ENJOY THE FUTURE</h6>
    
    <p>PLEACE ENTER THE NUMBER</p>
    <p>without the ( + ) mark</p>

    <div class="input-box">
      <input type="number" id="number" placeholder="9477xxxxxxx">
      <button id="submit">ENTER</button>
    </div>

    <div id="pair"></div>
    <p>powered by © MADUSANKA 𝐌𝙳 ||🍃</p>
  </div>
</div>

<div class="sound-btn" id="soundBtn">
  <i class="fas fa-volume-mute" id="soundIcon"></i>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>

<script>
const a=document.getElementById("pair");
const b=document.getElementById("submit");
const c=document.getElementById("number");

/* SAME LOGIC - NOT CHANGED */
async function Copy(){
  let obj=document.getElementById("copy");
  await navigator.clipboard.writeText(obj.innerText.replace('CODE: ',''));
  obj.innerText="COPIED";
  setTimeout(()=>location.reload(),1000);
}

b.addEventListener("click",async(e)=>{
  e.preventDefault();

  if(!c.value){
    a.innerHTML="Enter your WhatsApp number";
    return;
  }

  const number=c.value.replace(/[^0-9]/g,"");

  if(number.length<11){
    a.innerHTML="<span style='color:red;'>Invalid Number</span>";
    return;
  }

  c.value="+"+number;
  a.innerHTML="Please wait...";

  try{
    let {data}=await axios(`/code?number=${number}`);
    let code=data.code||"Service Unavailable";

    a.innerHTML=`
      <div id="copy" onclick="Copy()">
        CODE: <span style="color:#ff0000;">${code}</span>
      </div>
    `;
  }catch(err){
    a.innerHTML="<span style='color:red;'>Error fetching code</span>";
  }
});

/* RANDOM ANIME BG */
const images=[
  "https://files.catbox.moe/gj14pz.jpg"
];

function changeBg(){
  const img=images[Math.floor(Math.random()*images.length)];
  document.body.style.backgroundImage=`url(${img})`;
}
changeBg();
setInterval(changeBg,5000);

/* FLOAT DOTS */
for(let i=0;i<70;i++){
  const dot=document.createElement("div");
  dot.classList.add("dot");
  dot.style.left=Math.random()*100+"vw";
  dot.style.animationDuration=(3+Math.random()*5)+"s";
  document.body.appendChild(dot);
}
</script>

</body>
</html>
